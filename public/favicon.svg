<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0f4"/>
    </linearGradient>
    <radialGradient id="orb" cx="38%" cy="34%" r="70%">
      <stop offset="0" stop-color="#bcd6ff"/>
      <stop offset="55%" stop-color="#5ea2ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ea2ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- light premium plate -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none" stroke="#11111114"/>

  <!-- orbital ring -->
  <g transform="rotate(-28 32 32)">
    <ellipse cx="32" cy="32" rx="22" ry="9.5" fill="none" stroke="url(#ring)" stroke-width="2.6" opacity="0.9"/>
    <!-- orbiting node -->
    <circle cx="54" cy="32" r="3.4" fill="#a78bfa"/>
  </g>

  <!-- spatial orb -->
  <circle cx="32" cy="32" r="11" fill="url(#orb)"/>
  <circle cx="28.5" cy="28" r="3.4" fill="#ffffff" opacity="0.55"/>
</svg>
